name: Build and Release

on:
  push:
    branches:
      - "**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  frontend:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          npm --prefix frontend ci
          npm --prefix frontend run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: public/

  build:
    needs: frontend
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: amd64
            rust_target: x86_64-unknown-linux-musl
            goarch: amd64
          - target: arm64
            rust_target: aarch64-unknown-linux-musl
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: public/

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - name: Clone sing-box source
        run: git clone --depth=1 https://github.com/SagerNet/sing-box.git sing-box-src

      - name: Determine required Go version
        id: go-version
        run: |
          GO_VERSION=$(grep '^go ' sing-box-src/go.mod | awk '{print $2}')
          echo "version=${GO_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ steps.go-version.outputs.version }}
          cache-dependency-path: sing-box-src/go.sum

      - name: Install Zig for cross-compilation
        uses: mlugg/setup-zig@v2

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Build sing-box binary
        run: |
          mkdir -p embedded
          cd sing-box-src

          go build -ldflags "-s -w -buildid=" ./cmd/sing-box
          mv sing-box ../embedded/sing-box-host

          GOARCH=${{ matrix.goarch }} GOOS=linux CGO_ENABLED=0 go build \
            -v \
            -trimpath \
            -ldflags "-s -w -buildid=" \
            -tags "with_quic,with_clash_api,with_utls" \
            ./cmd/sing-box
          mv sing-box ../embedded/sing-box-${{ matrix.target }}

          cd ..
          rm -rf sing-box-src
          ls -lh embedded/

      - name: Download and compile geo rule files
        run: |
          curl -L -o embedded/geoip-cn.srs https://raw.githubusercontent.com/SagerNet/sing-geoip/rule-set/geoip-cn.srs
          curl -L -o /tmp/direct-list.txt https://raw.githubusercontent.com/Loyalsoldier/v2ray-rules-dat/release/direct-list.txt

          node -e '
            const fs = require("fs");
            const text = fs.readFileSync("/tmp/direct-list.txt", "utf-8");
            const domainList = [], suffixList = [], regexList = [];
            for (const raw of text.split("\n")) {
              const line = raw.trim();
              if (!line || line.startsWith("#")) continue;
              if (line.startsWith("full:")) domainList.push(line.slice(5));
              else if (line.startsWith("regexp:")) regexList.push(line.slice(7));
              else if (line.startsWith("domain:")) suffixList.push(line.slice(7));
              else suffixList.push(line);
            }
            const rules = {};
            if (domainList.length) rules.domain = domainList;
            if (suffixList.length) rules.domain_suffix = suffixList;
            if (regexList.length) rules.domain_regex = regexList;
            fs.writeFileSync("/tmp/direct-list.json", JSON.stringify({ version: 4, rules: [rules] }, null, 2));
          '

          ./embedded/sing-box-host rule-set compile /tmp/direct-list.json -o embedded/geosite-geolocation-cn.srs
          rm -f /tmp/direct-list.txt /tmp/direct-list.json
          ls -lh embedded/*.srs

      - name: Build release for ${{ matrix.target }}
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: cargo zigbuild --release --target ${{ matrix.rust_target }}

      - name: Prepare release asset
        run: |
          mv target/${{ matrix.rust_target }}/release/miao-rust miao-rust-linux-${{ matrix.target }}
          ASSET="miao-rust-linux-${{ matrix.target }}"
          sha256sum "$ASSET" | tee "${ASSET}.sha256"
          echo "RELEASE_ASSET=$ASSET" >> "$GITHUB_ENV"
          echo "RELEASE_SHA256=${ASSET}.sha256" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: miao-rust-${{ matrix.target }}
          path: |
            ${{ env.RELEASE_ASSET }}
            ${{ env.RELEASE_SHA256 }}

  release:
    needs: build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release-files
          cp artifacts/miao-rust-amd64/miao-rust-linux-amd64 release-files/
          cp artifacts/miao-rust-amd64/miao-rust-linux-amd64.sha256 release-files/
          cp artifacts/miao-rust-arm64/miao-rust-linux-arm64 release-files/
          cp artifacts/miao-rust-arm64/miao-rust-linux-arm64.sha256 release-files/
          ls -lh release-files/

      - name: Get version from Cargo.toml
        id: version
        run: |
          VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Delete existing latest release and tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes || true
          git push origin :refs/tags/latest || true

      - name: Create latest tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f latest
          git push -f origin latest

      - name: Create or Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Build (${{ steps.version.outputs.version }})"
          body: |
            ## Latest auto build

            Version: ${{ steps.version.outputs.version }}
            Commit: ${{ github.sha }}
            Branch: ${{ github.ref_name }}

            ### Assets

            - `miao-rust-linux-amd64`
            - `miao-rust-linux-amd64.sha256`
            - `miao-rust-linux-arm64`
            - `miao-rust-linux-arm64.sha256`
          files: release-files/*
          prerelease: false
          draft: false
